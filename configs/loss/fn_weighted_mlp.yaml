# FN-weighted InfoNCE loss with an external MLP pair scorer.
# For standard InfoNCE (no FN correction), see configs/loss/infonce.yaml.
#
# max_fn_weight: semantic cap on how much any single negative can be downweighted.
#   1.0 = full correction allowed (p_fn=1 removes the negative entirely)
#   0.5 = negatives are at most half-removed (conservative correction)
#
# The pair scorer (MLPPairScorer) is configured separately and its [B, B] output
# is passed as `p_fn` to the loss forward(). See configs/model/ for scorer configs.

_target_: src.losses.fn_weighted_infonce.FNWeightedInfoNCELoss

temperature: 0.07
normalize_embeddings: true
max_fn_weight: 1.0
