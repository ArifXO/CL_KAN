# configs/experiment/smoke_mlp.yaml
# Smoke experiment: MLP + InfoNCE on ChestMNIST (Stage 2)
# @package _global_

defaults:
  - /data: chestmnist
  - /model: mlp_baseline
  - /loss: infonce
  - _self_

trainer:
  max_epochs: 5            # smoke: short run to verify pipeline
  batch_size: 32
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  seed: 42
  device: cpu              # smoke: CPU only; override with device=cuda for full run

logging:
  log_every_n_steps: 10
  save_every_n_epochs: 1
