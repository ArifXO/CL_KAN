# Stage 2 MLP baseline: torchvision ResNet18 encoder + normalized MLP projector.

_target_: src.models.projectors.ContrastiveModel

backbone:
  _target_: src.models.backbones.TorchvisionBackbone
  name: resnet18
  in_channels: 1
  pretrained: false

projector:
  _target_: src.models.projectors.MLPProjector
  input_dim: 512
  hidden_dim: 256
  output_dim: 128
  num_layers: 2
  activation: relu
  use_batch_norm: true
  dropout: 0.0
  normalize: true
